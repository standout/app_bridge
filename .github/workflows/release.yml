name: Publish Gem to RubyGems
permissions:
  contents: read
  actions: write
on:
  release:
    types: [published]

jobs:
  ci-data:
    runs-on: ubuntu-latest
    outputs:
      result: ${{ steps.fetch.outputs.result }}
    steps:
      - uses: oxidize-rb/actions/fetch-ci-data@v1
        id: fetch
        with:
          supported-ruby-platforms: |
            exclude: [arm-linux, x64-mingw32, x64-mingw-ucrt, aarch64-mingw-ucrt]
          stable-ruby-versions: |
            exclude: [head]

  cross-gem:
    name: Compile native gem for ${{ matrix.platform }}
    runs-on: ubuntu-latest
    needs: ci-data
    strategy:
      matrix:
        platform: ${{ fromJSON(needs.ci-data.outputs.result).supported-ruby-platforms }}
    steps:
      - uses: actions/checkout@v6

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4.8"
          bundler-cache: true

      - name: Install OpenSSL dependency
        run: sudo apt-get update -qq && sudo apt-get install -y -qq libssl-dev pkg-config

      - uses: oxidize-rb/actions/cross-gem@v1
        id: cross-gem
        with:
          platform: ${{ matrix.platform }}
          ruby-versions: ${{ join(fromJSON(needs.ci-data.outputs.result).stable-ruby-versions, ',') }}

      - uses: actions/upload-artifact@v6
        with:
          name: cross-gem-${{ matrix.platform }}
          path: ${{ steps.cross-gem.outputs.gem-path }}

  publish-native-gems:
    name: Publish native gems to RubyGems (sequential)
    runs-on: ubuntu-latest
    needs: [ci-data, cross-gem]
    steps:
      - name: Download all built gems
        uses: actions/download-artifact@v7
        with:
          pattern: cross-gem-*
          path: pkg
          merge-multiple: true

      - name: Push native gems sequentially (retry + delay)
        env:
          GEM_HOST_API_KEY: "${{ secrets.RUBYGEMS_API_KEY }}"
        run: |
          set -euo pipefail

          ls -la pkg || true
          mapfile -t GEMS < <(ls -1 pkg/*.gem | sort)

          if [ "${#GEMS[@]}" -eq 0 ]; then
            echo "No native gems found in pkg/"
            exit 1
          fi

          for gemfile in "${GEMS[@]}"; do
            echo "==> Pushing $gemfile"

            # Retry transient failures (network / 5xx / rate limit bursts)
            # Note: if the version is yanked/exists, this will still fail; you need a new version.
            for attempt in 1 2 3 4 5; do
              set +e
              out=$(gem push "$gemfile" 2>&1)
              code=$?
              set -e

              echo "$out"

              # If already exists, treat as success (useful when re-running workflows)
              if echo "$out" | grep -qiE "Repushing of gem versions is not allowed|already been pushed|409"; then
                echo "Gem appears to already exist on RubyGems; skipping."
                code=0
              fi

              if [ "$code" -eq 0 ]; then
                break
              fi

              echo "Push failed (attempt $attempt/5). Sleeping before retry..."
              sleep $((attempt * 10))
            done

            if [ "$code" -ne 0 ]; then
              echo "Failed to push $gemfile after retries."
              exit 1
            fi

            # Space out requests to avoid rate limit bursts
            sleep 10
          done

  publish-gem:
    name: Publish gem to RubyGems
    runs-on: ubuntu-latest
    needs: [publish-native-gems]
    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4.8"
      - name: Build the gem
        run: gem build *.gemspec
      - name: Publish to RubyGems
        env:
          GEM_HOST_API_KEY: "${{ secrets.RUBYGEMS_API_KEY }}"
        run: gem push *.gem
